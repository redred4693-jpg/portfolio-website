<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOURS FAVOUR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#fff;
    text-align:center;
    padding:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    width:180px;
    height:auto;
}

.container{
    max-width:1200px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:auto;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#ff6600;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
    <!-- Channel Logo -->
    <img src="yours.png" alt="Channel Logo" class="logo">
    <h1>YOURS STORE</h1>
</header>

<div class="container">

    <!-- Product 1 -->
    <div class="card">
        <img src="phone.jpg" alt="Product 1">
        <div class="card-content">
            <h3>Product 1</h3>
            <a href="https://amzn.to/4auhm1Y" class="btn" target="_blank">
                View Product
            </a>
        </div>
    </div>

    <!-- Product 2 -->
    <div class="card">
        <img src="panda.webp" alt="Product 2">
        <div class="card-content">
            <h3>Product 2</h3>
            <a href="https://amzn.to/49Defo9" class="btn" target="_blank">
                View Product
            </a>
        </div>
    </div>

    <!-- Product 3 -->
    <div class="card">
        <img src="product3.jpg" alt="Product 3">
        <div class="card-content">
            <h3>Product 3</h3>
            <a href="" class="btn" target="_blank">
                View Product
            </a>
        </div>
    </div>

<!-- Product 4 -->
    <div class="card">
        <img src="product4.jpg" alt="Product 4">
        <div class="card-content">
            <h3>Product 4</h3>
            <a href="" class="btn" target="_blank">
                View Product
            </a>
        </div>
    </div>



</div>

</body>
</html>
